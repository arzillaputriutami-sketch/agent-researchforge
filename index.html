<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchForge — Multi-Agent Crypto Research Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e17;--panel:#0f1923;--border:#1e293b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--yellow:#eab308;--cyan:#22f7ff;--text:#e2e8f0;--muted:#94a3b8}
  *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
  .mono{font-family:'JetBrains Mono',monospace}.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px}
  .btn{padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;border:none;transition:.2s;font-size:14px}
  .btn-primary{background:var(--blue);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-ghost:hover{border-color:var(--blue)}
  input{background:#0f172a;border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;outline:none;width:100%;font-size:14px}
  input:focus{border-color:var(--blue)}
  .badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .fade-in{animation:fadeIn .3s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="max-w-5xl mx-auto p-4 lg:p-6">
  <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-lg" style="background:var(--blue);color:#fff">🔬</div>
      <div><h1 class="text-xl font-bold">ResearchForge</h1><p class="text-xs" style="color:var(--muted)">Real crypto research intelligence — CoinGecko data + token analysis</p></div>
    </div>
  </div>

  <div class="panel p-4 mb-6">
    <div class="flex gap-3">
      <input id="tokenInput" placeholder="Search token (e.g. ethereum, bitcoin, solana, uniswap)">
      <button onclick="research()" class="btn btn-primary">🔬 Research</button>
    </div>
    <div class="flex flex-wrap gap-2 mt-3">
      <button onclick="load('bitcoin')" class="btn btn-ghost text-xs">Bitcoin</button>
      <button onclick="load('ethereum')" class="btn btn-ghost text-xs">Ethereum</button>
      <button onclick="load('solana')" class="btn btn-ghost text-xs">Solana</button>
      <button onclick="load('chainlink')" class="btn btn-ghost text-xs">Chainlink</button>
    </div>
  </div>

  <div id="loading" class="hidden text-center py-12"><div class="inline-block w-8 h-8 border-3 rounded-full animate-spin" style="border:3px solid var(--border);border-top-color:var(--blue)"></div><p class="mt-3 text-sm" style="color:var(--muted)">Running multi-agent research...</p></div>
  <div id="error" class="hidden panel p-6 text-center max-w-md mx-auto"><div class="text-4xl mb-3">❌</div><p id="errMsg" class="text-sm" style="color:var(--muted)"></p></div>

  <div id="results" class="hidden fade-in">
    <!-- Token Header -->
    <div class="panel p-5 mb-6">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <div class="flex items-center gap-3">
            <img id="tokenImg" class="w-10 h-10 rounded-full" src="" alt="">
            <div><h2 id="tokenName" class="text-2xl font-bold"></h2><span id="tokenSymbol" class="badge" style="background:#1e293b;color:var(--cyan)"></span></div>
          </div>
          <p id="tokenDesc" class="text-sm mt-2 max-w-xl" style="color:var(--muted)"></p>
        </div>
        <div class="text-right">
          <p id="tokenPrice" class="text-3xl font-bold mono"></p>
          <p id="tokenChange" class="text-lg font-bold mono mt-1"></p>
        </div>
      </div>
    </div>

    <!-- Market Data -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
      <div class="panel p-4"><p class="text-xs" style="color:var(--muted)">MARKET CAP</p><p id="mcap" class="text-lg font-bold mono mt-1">—</p></div>
      <div class="panel p-4"><p class="text-xs" style="color:var(--muted)">24H VOLUME</p><p id="vol24h" class="text-lg font-bold mono mt-1">—</p></div>
      <div class="panel p-4"><p class="text-xs" style="color:var(--muted)">CIRCULATING</p><p id="circSupply" class="text-lg font-bold mono mt-1">—</p></div>
      <div class="panel p-4"><p class="text-xs" style="color:var(--muted)">ATH</p><p id="ath" class="text-lg font-bold mono mt-1">—</p></div>
    </div>

    <!-- Agent Research Reports -->
    <div class="space-y-4">
      <div class="panel p-5">
        <h3 class="font-semibold mb-3">📊 Market Analyst Report</h3>
        <div id="marketReport" class="text-sm space-y-2" style="color:var(--muted)"></div>
      </div>
      <div class="panel p-5">
        <h3 class="font-semibold mb-3">⚠️ Risk Assessment</h3>
        <div id="riskReport" class="text-sm space-y-2" style="color:var(--muted)"></div>
      </div>
      <div class="panel p-5">
        <h3 class="font-semibold mb-3">🔗 On-Chain Intelligence</h3>
        <div id="chainReport" class="text-sm space-y-2" style="color:var(--muted)"></div>
      </div>
      <div class="panel p-5">
        <h3 class="font-semibold mb-3">📝 Summary & Verdict</h3>
        <div id="verdictReport" class="text-sm space-y-2" style="color:var(--muted)"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
function load(t) { $('tokenInput').value = t; research(); }

async function research() {
  const query = $('tokenInput').value.trim().toLowerCase();
  if (!query) return;
  $('results').classList.add('hidden');
  $('error').classList.add('hidden');
  $('loading').classList.remove('hidden');

  try {
    // CoinGecko search
    const searchRes = await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(query)}`);
    if (!searchRes.ok) throw new Error('CoinGecko API error');
    const searchData = await searchRes.json();
    if (!searchData.coins?.length) throw new Error('Token "' + query + '" not found');

    const coinId = searchData.coins[0].id;
    
    // Fetch detailed data
    const detailRes = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}?localization=false&tickers=false&community_data=true&developer_data=false`);
    if (!detailRes.ok) throw new Error('Failed to fetch token details');
    const data = await detailRes.json();

    displayResearch(data);
  } catch(e) {
    $('loading').classList.add('hidden');
    $('error').classList.remove('hidden');
    $('errMsg').textContent = e.message;
  }
}

function displayResearch(data) {
  $('loading').classList.add('hidden');
  $('results').classList.remove('hidden');

  const md = data.market_data || {};
  $('tokenImg').src = data.image?.small || '';
  $('tokenName').textContent = data.name;
  $('tokenSymbol').textContent = data.symbol?.toUpperCase();
  $('tokenDesc').textContent = (data.description?.en || 'No description').replace(/<[^>]+>/g, '').slice(0, 500);

  $('tokenPrice').textContent = '$' + formatPrice(md.current_price?.usd);
  const change24 = md.price_change_percentage_24h || 0;
  $('tokenChange').textContent = (change24 >= 0 ? '+' : '') + change24.toFixed(2) + '%';
  $('tokenChange').style.color = change24 >= 0 ? 'var(--green)' : 'var(--red)';

  $('mcap').textContent = formatUSD(md.market_cap?.usd);
  $('vol24h').textContent = formatUSD(md.total_volume?.usd);
  $('circSupply').textContent = md.circulating_supply ? formatNum(md.circulating_supply) : '—';
  $('ath').textContent = md.ath?.usd ? '$' + formatPrice(md.ath.usd) : '—';

  // Market Analyst
  const mcapRank = data.market_cap_rank || '?';
  const volMcapRatio = md.market_cap?.usd && md.total_volume?.usd ? (md.total_volume.usd / md.market_cap.usd * 100) : 0;
  $('marketReport').innerHTML = `
    <p>• <strong>Market Cap Rank:</strong> #${mcapRank}</p>
    <p>• <strong>Volume/Market Cap Ratio:</strong> ${volMcapRatio.toFixed(2)}% — ${volMcapRatio > 10 ? 'High trading activity, good liquidity' : volMcapRatio > 2 ? 'Moderate trading activity' : 'Low relative volume — potential liquidity concerns'}</p>
    <p>• <strong>7D Change:</strong> ${(md.price_change_percentage_7d||0).toFixed(2)}%</p>
    <p>• <strong>30D Change:</strong> ${(md.price_change_percentage_30d||0).toFixed(2)}%</p>
    <p>• <strong>1Y Change:</strong> ${(md.price_change_percentage_1y||0).toFixed(2)}%</p>
    <p>• <strong>All-Time High:</strong> $${formatPrice(md.ath?.usd)} (${(md.ath_change_percentage?.usd||0).toFixed(1)}% from ATH)</p>
  `;

  // Risk Assessment
  const riskFactors = [];
  if (Math.abs(change24) > 15) riskFactors.push({ factor: 'Volatility', level: 'HIGH', detail: '24h change >15% — extremely volatile' });
  else if (Math.abs(change24) > 5) riskFactors.push({ factor: 'Volatility', level: 'MEDIUM', detail: '24h change >5% — moderate volatility' });
  else riskFactors.push({ factor: 'Volatility', level: 'LOW', detail: 'Stable 24h movement' });

  if (volMcapRatio < 1) riskFactors.push({ factor: 'Liquidity', level: 'HIGH', detail: 'Very low volume relative to market cap' });
  else riskFactors.push({ factor: 'Liquidity', level: volMcapRatio > 5 ? 'LOW' : 'MEDIUM', detail: volMcapRatio.toFixed(1) + '% vol/mcap ratio' });

  const athDrop = md.ath_change_percentage?.usd || 0;
  if (athDrop < -80) riskFactors.push({ factor: 'Drawdown', level: 'HIGH', detail: Math.abs(athDrop).toFixed(0) + '% below ATH' });
  else if (athDrop < -50) riskFactors.push({ factor: 'Drawdown', level: 'MEDIUM', detail: Math.abs(athDrop).toFixed(0) + '% below ATH' });
  else riskFactors.push({ factor: 'Drawdown', level: 'LOW', detail: Math.abs(athDrop).toFixed(0) + '% from ATH' });

  $('riskReport').innerHTML = riskFactors.map(r => 
    `<p>• <strong style="color:${r.level==='HIGH'?'var(--red)':r.level==='MEDIUM'?'var(--yellow)':'var(--green)'}">[${r.level}] ${r.factor}:</strong> ${r.detail}</p>`
  ).join('');

  // On-chain
  $('chainReport').innerHTML = `
    <p>• <strong>Genesis Date:</strong> ${data.genesis_date || 'Unknown'}</p>
    <p>• <strong>Hashing Algorithm:</strong> ${data.hashing_algorithm || 'N/A'}</p>
    <p>• <strong>Block Time:</strong> ${data.block_time_in_minutes ? data.block_time_in_minutes + ' min' : 'N/A'}</p>
    <p>• <strong>Categories:</strong> ${(data.categories||[]).join(', ') || 'N/A'}</p>
    <p>• <strong>Platforms:</strong> ${Object.keys(data.platforms||{}).join(', ') || 'Native chain'}</p>
    <p>• <strong>GitHub Repos:</strong> ${data.repos_url?.github?.length || 0} repositories</p>
    <p>• <strong>Subreddit:</strong> ${data.subreddit_url ? 'Active' : 'None'}</p>
  `;

  // Verdict
  const overallScore = riskFactors.filter(r => r.level === 'LOW').length * 30 + riskFactors.filter(r => r.level === 'MEDIUM').length * 15;
  let verdict, vcolor;
  if (overallScore >= 70) { verdict = 'BULLISH — Strong fundamentals, good liquidity, manageable risk'; vcolor = 'var(--green)'; }
  else if (overallScore >= 40) { verdict = 'NEUTRAL — Mixed signals, moderate risk'; vcolor = 'var(--yellow)'; }
  else { verdict = 'CAUTION — High risk factors, careful position sizing'; vcolor = 'var(--red)'; }

  $('verdictReport').innerHTML = `
    <p class="text-lg font-bold" style="color:${vcolor}">${verdict}</p>
    <p>• Overall Score: <strong>${overallScore}/100</strong></p>
    <p>• Research agents: Market Analyst, Risk Assessor, On-Chain Intelligence</p>
    <p>• Data source: CoinGecko (live)</p>
    <p>• Disclaimer: This is automated analysis, not financial advice.</p>
  `;
}

function formatPrice(v) { if (!v) return '0'; return v >= 1 ? v.toLocaleString('en-US', {maximumFractionDigits:2}) : v.toPrecision(4); }
function formatUSD(v) { if (!v) return '—'; if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B'; if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M'; if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K'; return '$' + v.toFixed(2); }
function formatNum(n) { return n >= 1e9 ? (n/1e9).toFixed(2)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : n.toFixed(0); }
$('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') research(); });
</script>
<script src="static/upgrade.js"></script>
</body>
</html>
